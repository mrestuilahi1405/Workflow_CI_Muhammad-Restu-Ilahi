name: MLflow Project CI

on: [push]

jobs:
  run-ml-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'
          
      - name: Install Tools
        run: |
          # Kita tambahkan 'uv' sebagai bumbu rahasia agar MLflow tidak crash
          pip install mlflow pandas scikit-learn dagshub virtualenv uv
          
      - name: Run MLflow Project
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_PYTHON_BIN: python
        run: |
          mlflow run MLProject --experiment-name "CI_Workflow_Muhammad-Restu-Ilahi" --env-manager virtualenv