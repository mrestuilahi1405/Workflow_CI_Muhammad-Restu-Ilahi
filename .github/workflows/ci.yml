name: MLflow Project CI

on: [push]

jobs:
  run-ml-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'
          
      - name: Install All Dependencies
        run: |
          # Kita instal semua kebutuhan model langsung di runner
          pip install mlflow==2.19.0 pandas scikit-learn dagshub joblib virtualenv
          
      - name: Run MLflow Project
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_URI: https://dagshub.com/mrestuilahi1405/Eksperimen_SML_Muhammad-Restu-Ilahi.mlflow
        run: |
          # Gunakan --env-manager local karena runner sudah kita siapkan library-nya
          mlflow run MLProject --experiment-name "CI_Workflow_Muhammad-Restu-Ilahi" --env-manager local